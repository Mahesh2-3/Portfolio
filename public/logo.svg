<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#0a0a0a" />

  <!-- Neon Glow Filter -->
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="white"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="white"/>
    </filter>
  </defs>

  <!-- Bold White "M" with Neon Glow -->
  <text x="50%" y="55%" font-family="sans" font-size="100" 
        font-weight="bold" fill="white" text-anchor="middle" 
        dominant-baseline="middle" filter="url(#neon-glow)">
    M
  </text>
</svg>
